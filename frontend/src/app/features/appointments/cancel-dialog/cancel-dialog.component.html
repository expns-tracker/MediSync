<h2 mat-dialog-title>Cancel Appointment?</h2>

<mat-dialog-content>
  <p>Are you sure you want to cancel this appointment? This action cannot be undone.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Keep Appointment</button>
  <button mat-raised-button color="warn" (click)="onConfirm()">Cancel Appointment</button>
</mat-dialog-actions>
