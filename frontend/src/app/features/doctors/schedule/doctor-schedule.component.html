<main class="doctor-schedule-page">
  <mat-card class="schedule-card">
    <mat-card-header>
      <mat-card-title>My Weekly Schedule</mat-card-title>
      <mat-card-subtitle>
        Review your current weekly working shifts.
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="loading-state" *ngIf="isLoading()">
        <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
      </div>

      <div class="error-state" *ngIf="!isLoading() && errorMessage()">
        {{ errorMessage() }}
      </div>

      <mat-list *ngIf="!isLoading() && !errorMessage() && schedules().length > 0">
        <mat-list-item *ngFor="let schedule of schedules()" class="schedule-item">
          <mat-icon matListIcon aria-hidden="true">calendar_today</mat-icon>

          <div class="schedule-details">
            <div class="schedule-day" matLine>{{ getDayLabel(schedule.dayOfWeek) }}</div>
            <div class="schedule-time" matLine>
              {{ schedule.startTime }} - {{ schedule.endTime }}
            </div>
          </div>

        </mat-list-item>
      </mat-list>

      <div *ngIf="!isLoading() && !errorMessage() && schedules().length === 0" class="empty-state">
        No schedule entries were found for your account.
      </div>
    </mat-card-content>
  </mat-card>
</main>
