name: Java CI/CD with Docker and K8s

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Core Service
      run: |
        cd microservices/core-service
        ./mvnw clean verify
        
    - name: Build Reporting Service
      run: |
        cd microservices/reporting-service
        ./mvnw clean verify

    - name: Build Notification Service
      run: |
        cd microservices/notification-service
        ./mvnw clean verify

    - name: Build Gateway Service
      run: |
        cd microservices/gateway-service
        ./mvnw clean verify

    # Note: Docker build and push would go here if secrets were configured
    # - name: Docker Build and Push
    #   run: |
    #     docker build -t medisync/core-service:latest microservices/core-service
    #     docker push medisync/core-service:latest
